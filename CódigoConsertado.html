<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Sistema de suporte para atendimento ao cliente">

    <title>Área de Contato do Cliente</title>
</head>

<body>

    <header>
        <h1>Site sério.</h1>

        <nav>
            <a href="#">Ajuda</a> |
            <a href="#">Sair</a>
        </nav>
    </header>

    <main>

        <section>

            <article>

                <h2>Área de Contato do Cliente</h2>

                <p>Envie sua mensagem para a nossa equipe de suporte backend.</p>

                <form action="/enviar" method="POST">

                    <label for="nome">Nome:</label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required
                        minlength="4"
                        maxlength="10">

                    <br><br>

                    <label for="email">Email:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>

                    <br><br>

                    <label for="celular">Telefone Celular:</label>
                    <input
                        type="tel"
                        id="celular"
                        name="celular"
                        pattern="[0-9]{11}"
                        required>

                    <br><br>

                    <label for="msg">Mensagem:</label>
                    <textarea
                        id="msg"
                        name="msg"></textarea>

                    <br><br>

                    <input
                        type="submit"
                        value="Disparar Dados">

                </form>

            </article>

        </section>

    </main>

    <footer>
        <p>Suporte Tech 2026</p>
    </footer>

</body>

</html>
