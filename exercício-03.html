<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>

<body>

    <section class="bloco-cronograma">

        <h2 class="titulo-seccao">
            Horários acadêmicos
        </h2>

        <table border="1">

            <caption>
                Grade horária das aulas do módulo
            </caption>

            <thead>
                <tr>
                    <th>Aula</th>
                    <th>Horário</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Estruturação Multimídia</td>
                    <td>19:00 - 20:30</td>
                </tr>
            </tbody>

        </table>

        <p>Recursos necessários:</p>

        <ul>
            <li>Computador com IDE configurada</li>
            <li>Arquivos de legenda (.vtt) prontos</li>
        </ul>

    </section>

    <hr>

    <section class="bloco-video">

        <h2>Apresentação da Disciplina</h2>

        <video controls>
            <source src="apresentacao.mp4" type="video/mp4">

            <track
                kind="captions"
                src="legendas.vtt"
                srclang="pt"
                label="Português">

            Seu navegador não suporta vídeo.
        </video>

    </section>

    <section class="bloco-mapa">

        <h2>Localização do Campus IFF</h2>

        <iframe
            src="https://mapas.iff.edu.br"
            title="Mapa de localização do Campus IFF"
            sandbox="">
        </iframe>

    </section>

</body>

</html>
